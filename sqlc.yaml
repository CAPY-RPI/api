version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "user_role"
            go_type: "string"
